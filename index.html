<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tractova</title>
    <meta name="description" content="Community solar and renewable energy market intelligence for independent developers. Real-time program status, interconnection data, and deal screening." />

    <!-- Favicons. Multi-format because Google's search snippet crawler
         picks up .ico, browser tabs prefer SVG when supported, iOS
         Safari needs apple-touch-icon, and Android Chrome / PWA
         contexts read the 192/512 PNGs from site.webmanifest.
         Generated by scripts/build-favicons.mjs from favicon.svg. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0F1A2E" />

    <!-- Open Graph / Twitter Card — for Slack / iMessage / LinkedIn /
         Twitter unfurls. og-image.png is 1200x630, generated alongside
         the favicons. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tractova.com/" />
    <meta property="og:title" content="Tractova" />
    <meta property="og:description" content="Community solar and renewable energy market intelligence for independent developers." />
    <meta property="og:image" content="https://www.tractova.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tractova" />
    <meta name="twitter:description" content="Community solar and renewable energy market intelligence for independent developers." />
    <meta name="twitter:image" content="https://www.tractova.com/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
